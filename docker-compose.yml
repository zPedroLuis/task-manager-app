services:
  db:
    image: postgres:16-alpine
    container_name: task_manager_db
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  external-api:
    build:
      context: ./external_api
    container_name: task_manager_external_api
    ports:
      - "8001:8001"

  backend:
    build:
      context: ./backend
    container_name: task_manager_backend
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: dev-secret-key
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      POSTGRES_DB: task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      EXTERNAL_API_BASE_URL: "http://external-api:8001"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - external-api

  frontend:
    build:
      context: ./frontend
    container_name: task_manager_frontend
    environment:
      VITE_API_URL: "http://localhost:8000/api"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
